<script type="text/javascript">
// <![CDATA[
// ===================== 核心变量定义 =====================
// 1. 地图初始化（AI地形图风格）
var map = L.map('map').setView([33.0, 118.0], 4); // 初始聚焦中国中部，适配更多革命点
// 高德AI地形图瓦片
L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
	maxZoom: 19,
	minZoom: 3,
	attribution: '高德AI地形图'
}).addTo(map);

// 2. 图层分组（核心分层逻辑）
var southLayer = L.layerGroup(); // 第一序列：南部图层（下层）
var northLayer = L.layerGroup(); // 第二序列：北部图层（上层）
var routeLayer = L.layerGroup(); // 革命路线图层
var flagLayer = L.layerGroup();  // 红旗标记图层
// 初始只加载南部图层（第一章）
southLayer.addTo(map);

// 3. 核心革命路线数据（嘉兴为起点，优化路线节点贴合实际地理）
var revolutionRoute = {
	// 主路线节点（按革命历史进程+地理实际排序，保留原有曲折性）
	mainPoints: [
		{lat: 30.7563, lng: 120.7506}, // 起点：嘉兴南湖
		{lat: 25.8240, lng: 116.0170}, // 瑞金
		{lat: 27.7172, lng: 106.9428}, // 遵义

		{lat: 36.5683, lng: 109.4700}, // 延安
		{lat: 39.3815, lng: 113.8960}, // 平型关
		{lat: 38.2084, lng: 114.3580}  // 终点：西柏坡
	],
	// 终点红旗位置（西柏坡）
	flag: {
		lat: 38.2084,
		lng: 114.3580
	}
};

// 4. 扩充后的红色革命点数据（分南北，含非途经相关点）
// 第一序列：南部革命点（改为固定不可拖动）

	{

		phone: "0796-6552248",
		addr: "江西省吉安市井冈山市茨坪镇红军南路",

	},

		phone: "0797-2522600",

		intro: "贵州省遵义市红花岗区，遵义会议召开地，中国革命史上的重要转折点。",
		phone: "0851-28222785",
		addr: "贵州省遵义市红花岗区子尹路96号",
		tag: "南",
		type: "核心途经点"
	},
	// 新增非途经相关点
	{
		name: "韶山毛泽东故居",

		img: "https://picsum.photos/id/1045/300/200",
		intro: "湖南省湘潭市韶山市，毛泽东同志故居，红色革命发源地之一。",
		phone: "0731-55685170",
		addr: "湖南省湘潭市韶山市韶山乡韶山村",
		tag: "南",
		type: "相关革命点"
	},
	{

		lat: 25.1570,
		lng: 116.7910,
		img: "https://picsum.photos/id/1046/300/200",
		intro: "福建省龙岩市上杭县，古田会议召开地，确立了党对军队的绝对领导。",
		phone: "0597-36411古田会议会址",
		addr: "福建省龙岩市上杭县古田镇古田路76号",

	}

// 第二序列：北部革命点（固定不可拖动，保持原有）
var northSites = [
	// 核心途经点
	{
		name: "西柏坡纪念馆",
		lat: 38.2084,
		lng: 114.3580,

		phone: "0311-82851355",
		addr: "河北省石家庄市平山县西柏坡镇迎宾路",

		phone: "0911-8213666",
		addr: "陕西省延安市宝塔区王家坪路",

		phone: "0352-8938061",

	},
	// 新增非途经相关点
	{

		phone: "0312-8861678",

		tag: "北",
		type: "相关革命点"
	},
	{

		lat: 35.7230,
		lng: 117.9890,
		img: "https://picsum.photos/id/1050/300/200",
		intro: "山东省临沂市沂水县，沂蒙精神发源地，华东地区重要革命根据地。",
		phone: "0539-2251186",
		addr: "山东省临沂市沂水县夏蔚镇王庄村",
		tag: "北",
		type: "相关革命点"
	}

// ===================== 路线绘制与红旗标记（优化） =====================
// 绘制红旗标记（初始隐藏）
var flagMarker = L.marker([revolutionRoute.flag.lat, revolutionRoute.flag.lng], {
	icon: L.divIcon({
		className: 'marker-flag',
		html: '<i class="fa fa-flag"></i>',
		iconSize: [40, 40]
	}),
	draggable: false
});
flagMarker.bindPopup("<div class='popup-box'><div class='popup-title-north'>革命路线终点</div><p style='text-align:center;color:#C72E29;font-weight:bold;'>革命胜利 · 红旗飘扬</p></div>");
flagMarker.addTo(flagLayer);

// 分步绘制路线函数（降低速度，保留原有曲折路线）
var routePolyline; // 路线对象
function drawRouteStepByStep() {
	// 清空原有路线
	if(routePolyline) routeLayer.removeLayer(routePolyline);
	
	// 核心修改1：路线速度调慢（从800ms改为2000ms每段，可根据需求调整）
	var step = 0;
	var totalSteps = revolutionRoute.mainPoints.length - 1;
	var drawInterval = setInterval(function() {
		step++;
		// 截取当前步骤的路线点（保留原有曲折性，不修改坐标）
		var currentPoints = revolutionRoute.mainPoints.slice(0, step + 1);
		// 绘制/更新路线（保留原有样式，不修改曲折度）
		if(routePolyline) routeLayer.removeLayer(routePolyline);
		routePolyline = L.polyline(currentPoints, {
			color: '#C72E29',       // 红色主调贴合红色主题
			weight: 6,              // 适中宽度，适配地形
			opacity: 0.85,          // 半透明不遮挡地图地形
			lineCap: 'round',       // 圆角端点更自然
			lineJoin: 'round',      // 圆角连接更贴合地理曲线
			className: 'route-line'
		}).addTo(routeLayer);
		
		// 绘制完成（最后一步）
		if(step >= totalSteps) {
			clearInterval(drawInterval);
			// 显示红旗标记
			map.addLayer(flagLayer);
			// 地图自动聚焦到终点
			map.setView([revolutionRoute.flag.lat, revolutionRoute.flag.lng], 5);
			// 更友好的提示
			alert('✅ 完整革命路线绘制完成！\n终点西柏坡已亮起红旗，可切换第二章查看北部所有革命点～');
		}
	}, 2000); // 核心修改：速度从800ms改为2000ms，更慢且保留原有曲折路线
}

// 1. 添加南部标记（核心修改2：改为固定不可拖动）

	var site = southSites[i];
	var marker = L.marker([site.lat, site.lng], {
		icon: L.divIcon({
			className: 'marker-south',
			html: '红船谣',
			iconSize: [60, 60]
		}),
		draggable: false // 核心修改：南部点改为固定不可拖动
	});
	
	// 南部弹窗（补充点位类型，保持原有）
	var encodedAddr = encodeURIComponent(site.addr);
	var webNavUrl = "https://amap.com/search?query=" + encodedAddr;
	var popupContent = "<div class='popup-box'>" +
		"<div class='popup-title-south'>" + site.name + "（南部" + site.type + "）</div>" +
		"<img src='" + site.img + "' class='popup-img' alt='" + site.name + "' />" +
		"<div class='popup-info'><span class='popup-label'>简介：</span>" + site.intro + "</div>" +
		"<div class='popup-info'><span class='popup-label'>电话：</span>" + site.phone + "</div>" +
		"<div class='popup-info'><span class='popup-label'>地址：</span>" + site.addr + "</div>" +
		"<a href='" + webNavUrl + "' target='_blank' class='nav-btn'><i class='fa fa-desktop'></i> 导航</a>" +
	"</div>";
	
	marker.bindPopup(popupContent);
	marker.addTo(southLayer);
	
	// 嘉兴标记点击事件：绘制路线 + 解锁第二章（保持原有）
	if(site.name.indexOf("嘉兴") !== -1) {
		marker.on('click', function(){
			document.getElementById('btnChapter2').classList.remove('disabled');
			// 添加路线图层并开始绘制
			map.addLayer(routeLayer);
			drawRouteStepByStep();
		});
	} else {
		// 其他南部点仅解锁第二章（保持原有）
		marker.on('click', function(){
			document.getElementById('btnChapter2').classList.remove('disabled');
		});
	}
	
	// 核心修改3：移除南部点的拖拽事件（因为已固定）
	// 原拖拽事件代码已删除，确保无法拖拽
}

// 2. 添加北部标记（固定不可拖动，保持原有）
for(var i=0; i<northSites.length; i++){
	var site = northSites[i];
	var marker = L.marker([site.lat, site.lng], {
		icon: L.divIcon({

	// 北部弹窗（补充点位类型，保持原有）
	var encodedAddr = encodeURIComponent(site.addr);

	var popupContent = "<div class='popup-box'>" +
		"<div class='popup-title-north'>" + site.name + "（北部" + site.type + "）</div>" +

// ===================== 章节切换逻辑（适配扩充点，保持原有） =====================
var btnChapter1 = document.getElementById('btnChapter1');
var btnChapter2 = document.getElementById('btnChapter2');
var chapterTitle = document.getElementById('chapterTitle');

// 第一章：显示南部图层，隐藏北部/路线/红旗图层（保持原有）
btnChapter1.onclick = function(){
	if(!btnChapter2.classList.contains('disabled')){
		map.removeLayer(northLayer);
		map.removeLayer(routeLayer);
		map.removeLayer(flagLayer);
		map.addLayer(southLayer);
		// 地图聚焦南部核心区
		map.setView([30.7563, 120.7506], 4);
		chapterTitle.textContent = "第一章：南部红色革命圣地（嘉兴/井冈山/瑞金/韶山等）";
	}
};

// 第二章：显示北部/路线/红旗图层，隐藏南部图层（保持原有）
btnChapter2.onclick = function(){
	if(!this.classList.contains('disabled')){
		map.removeLayer(southLayer);
		map.addLayer(northLayer);
		map.addLayer(routeLayer);
		map.addLayer(flagLayer);
		// 地图聚焦北部核心区
		map.setView([38.2084, 114.3580], 4);
		chapterTitle.textContent = "第二章：北部红色革命圣地（西柏坡/延安/平型关等）";
	}
};

// ===================== AI助手交互逻辑（保持原有，未修改） =====================
var aiAssistant = document.getElementById('aiAssistant');
var aiToggle = document.getElementById('aiToggle');
var aiInput = document.getElementById('aiInput');
var aiSend = document.getElementById('aiSend');
var aiChat = document.getElementById('aiChat');

// AI助手折叠/展开
aiToggle.onclick = function(){
	aiAssistant.classList.toggle('collapsed');
	if(aiAssistant.classList.contains('collapsed')){
		aiToggle.innerHTML = '<i class="fa fa-chevron-right"></i>';
	} else {
		aiToggle.innerHTML = '<i class="fa fa-chevron-left"></i>';
	}
};

// AI消息发送
aiSend.onclick = function(){
	sendAiMessage();
};
aiInput.onkeydown = function(e){
	if(e.key === 'Enter'){
		sendAiMessage();
	}
};

// AI消息处理（保持原有）
function sendAiMessage(){
	var msg = aiInput.value.trim();
	if(msg === '') return;
	
	// 添加用户消息
	var userMsg = document.createElement('div');
	userMsg.className = 'ai-message ai-user';
	userMsg.textContent = msg;
	aiChat.appendChild(userMsg);
	aiInput.value = '';
	aiChat.scrollTop = aiChat.scrollHeight;
	
	// 模拟AI回复（保持原有）
	setTimeout(function(){
		var botMsg = document.createElement('div');
		botMsg.className = 'ai-message ai-bot';
		
		// 关键词匹配回复（保持原有）
		if(msg.indexOf('路线') !== -1 || msg.indexOf('哪些点') !== -1){
			botMsg.innerHTML = "📌 革命路线核心途经点（按历史进程）：<br/>" +
				"<div class='ai-list'>1. 嘉兴南湖（起点）</div>" +
				"<div class='ai-list'>2. 瑞金</div>" +
				"<div class='ai-list'>3. 遵义</div>" +
				"<div class='ai-list'>4. 井冈山</div>" +
				"<div class='ai-list'>5. 延安</div>" +
				"<div class='ai-list'>6. 平型关</div>" +
				"<div class='ai-list'>7. 西柏坡（终点）</div>" +
				"<span class='ai-highlight'>提示：点击嘉兴标记可自动绘制完整路线～</span>";
		} else if(msg.indexOf('南部') !== -1){
			botMsg.innerHTML = "🌡️ 南部革命点包含：<br/>" +
				"<div class='ai-list'>▫️ 核心途经点：嘉兴、井冈山、瑞金、遵义</div>" +
				"<div class='ai-list'>▫️ 相关革命点：韶山、古田、百色</div>" +
				"<span class='ai-highlight'>特点：均为早期革命核心区域～</span>";
		} else if(msg.indexOf('北部') !== -1){
			botMsg.innerHTML = "❄️ 北部革命点包含：<br/>" +
				"<div class='ai-list'>▫️ 核心途经点：延安、平型关、西柏坡</div>" +
				"<div class='ai-list'>▫️ 相关革命点：北京天安门、狼牙山、沂蒙山</div>" +
				"<span class='ai-highlight'>特点：多为抗战/解放时期核心区域～</span>";
		} else if(msg.indexOf('红船') !== -1 || msg.indexOf('嘉兴') !== -1){
			botMsg.innerHTML = "🚢 嘉兴南湖红船意义：<br/>" +
				"中共一大在嘉兴南湖红船上闭幕，标志着中国共产党正式成立。<br/>" +
				"<span class='ai-highlight'>红船精神：开天辟地、敢为人先的首创精神～</span>";
		} else {
			botMsg.innerHTML = "💡 你可以提问这些问题：<br/>" +
				"<div class='ai-list'>• 革命路线有哪些点？</div>" +
				"<div class='ai-list'>• 南部有哪些革命点？</div>" +
				"<div class='ai-list'>• 嘉兴红船的意义？</div>" +
				"<div class='ai-list'>• 北部革命点的特点？</div>";
		}
		
		aiChat.appendChild(botMsg);
		aiChat.scrollTop = aiChat.scrollHeight;
	}, 800);
}
